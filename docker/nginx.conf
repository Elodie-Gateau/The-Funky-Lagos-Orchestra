server {
    listen 80;
    server_name thefunkylagosorchestra.com www.thefunkylagosorchestra.com;
    return 301 https://www.thefunkylagosorchestra.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name thefunkylagosorchestra.com;
    ssl_certificate /etc/letsencrypt/live/thefunkylagosorchestra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thefunkylagosorchestra.com/privkey.pem;
    return 301 https://www.thefunkylagosorchestra.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.thefunkylagosorchestra.com;
    ssl_certificate /etc/letsencrypt/live/thefunkylagosorchestra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thefunkylagosorchestra.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml font/woff2;
    gzip_min_length 1024;
    gzip_comp_level 6;

    root /var/www/html/public;
    index index.php;

    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain";
    }

    location = /sitemap.xml {
        try_files $uri =404;
        add_header Content-Type "application/xml";
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|mp3|ttf|otf|eot|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin "*";
    log_not_found off;
    }

    client_max_body_size 20M;
}
