services:
  database:
    image: mysql:8.0
    container_name: symfony_mysql
    env_file:
      - .env.local
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/mysql

volumes:
  database_data:
