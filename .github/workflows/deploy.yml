name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
              cd /home/ubuntu/The-Funky-Lagos-Orchestra
              git pull origin main
              docker compose --env-file .env.local -f compose.prod.yaml build
              docker compose --env-file .env.local -f compose.prod.yaml up -d
              docker compose --env-file .env.local -f compose.prod.yaml exec -T app php bin/console cache:clear --env=prod
