security:
    password_hashers:
        App\Entity\User:
            algorithm: auto
    # Où trouver les utilisateurs ?
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Les firewalls
    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            # Permet de stocker l’utilisateur en session
            lazy: true
            provider: app_user_provider

            json_login:
                check_path: api_login
                username_path: email
                password_path: password
                success_handler: App\Security\AuthenticationSuccessHandler
                failure_handler: App\Security\AuthenticationFailureHandler

            logout:
                path: /api/logout

    # Les règles d'accès
    access_control:
        - { path: ^/api/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
